name: Release

# Build, codesign (Developer ID), notarize, staple, and package MacColi, then
# attach the artifacts to a GitHub Release. The pipeline is self-contained —
# everything runs inline below; CI only reconstructs the keychain state it
# needs (a Developer ID identity + a "MacColiNotary" notary profile) from
# repository secrets. The build is deterministic: the signing identity and
# Team ID are autodetected from the keychain and the version from Info.plist.
#
# Triggers:
#   - push a tag like `v0.1.0`  → builds and publishes a GitHub Release
#   - manual "Run workflow"     → builds and uploads artifacts only (no Release)

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write # needed to create the Release on tag builds

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      # MacColi.xcodeproj is objectVersion 77 (Xcode 16+ synchronized-folder
      # format); the image's default Xcode may be older and would fail with
      # "Unable to read project". Select the newest Xcode the runner has.
      - name: Select latest Xcode
        run: |
          set -euo pipefail
          latest="$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1 || true)"
          if [ -n "$latest" ]; then sudo xcode-select -s "$latest"; fi
          xcodebuild -version

      # Recreate the Developer ID signing identity in an ephemeral keychain so
      # the build's `security find-identity` autodetection finds it, exactly
      # like on the developer's Mac.
      - name: Import Developer ID certificate
        env:
          P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/maccoli-build.keychain-db"
          KEYCHAIN_PW="$(uuidgen)"   # ephemeral; the keychain dies with the runner
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/developer-id.p12"

          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"   # no early auto-lock
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security import "$RUNNER_TEMP/developer-id.p12" -k "$KEYCHAIN" \
            -P "$P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign use the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make this keychain the default and put it on the search list so both
          # codesign and notarytool (the MacColiNotary profile, stored next)
          # resolve against it.
          existing="$(security list-keychains -d user | sed -e 's/\"//g' -e 's/^[[:space:]]*//')"
          security list-keychains -d user -s "$KEYCHAIN" $existing
          security default-keychain -s "$KEYCHAIN"

          rm -f "$RUNNER_TEMP/developer-id.p12"
          echo "Installed identities:"
          security find-identity -v -p codesigning

      # Store notary credentials under the same "MacColiNotary" profile name the
      # build below passes to `notarytool --keychain-profile`.
      - name: Store notarization credentials
        env:
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_APP_PASSWORD: ${{ secrets.NOTARY_APP_PASSWORD }}
        run: |
          set -euo pipefail
          xcrun notarytool store-credentials "MacColiNotary" \
            --apple-id "$NOTARY_APPLE_ID" \
            --team-id "$NOTARY_TEAM_ID" \
            --password "$NOTARY_APP_PASSWORD"

      # Release build → codesign (Developer ID + hardened runtime + secure
      # timestamp) → notarize → staple → package (zip + DMG). Distribution is
      # outside the Mac App Store because the app spawns colima/docker/brew and
      # reaches the Colima socket, which the App Store sandbox forbids.
      - name: Build · sign · notarize · staple · package
        env:
          NOTARY_PROFILE: MacColiNotary
        run: |
          set -euo pipefail

          PROJECT="MacColi.xcodeproj"
          SCHEME="MacColi"
          DIST="$PWD/dist"

          # Resolve the Developer ID signing identity from the keychain; the
          # Team ID is the 10-char code in the identity's trailing parentheses.
          IDENTITY="$(security find-identity -v -p codesigning \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}')"
          if [[ -z "$IDENTITY" ]]; then
              echo "No 'Developer ID Application' identity in keychain" >&2
              security find-identity -v -p codesigning >&2 || true
              exit 1
          fi
          TEAM_ID="$(sed -E 's/.*\(([A-Z0-9]+)\)$/\1/' <<<"$IDENTITY")"
          echo "Signing identity: $IDENTITY"
          echo "Team ID:          $TEAM_ID"

          # Build (Release, unsigned — we sign explicitly below).
          echo "Building $SCHEME (Release)…"
          xcodebuild -project "$PROJECT" -scheme "$SCHEME" -configuration Release \
              build CODE_SIGNING_ALLOWED=NO

          # Resolve the product path from build settings so we don't hardcode
          # the machine-specific DerivedData hash.
          SETTINGS="$(xcodebuild -project "$PROJECT" -scheme "$SCHEME" \
              -configuration Release -showBuildSettings 2>/dev/null)"
          TBD="$(sed -n 's/^[[:space:]]*TARGET_BUILD_DIR = //p'  <<<"$SETTINGS" | head -1)"
          FPN="$(sed -n 's/^[[:space:]]*FULL_PRODUCT_NAME = //p' <<<"$SETTINGS" | head -1)"
          SRC_APP="$TBD/$FPN"
          if [[ -z "$TBD" || -z "$FPN" || ! -d "$SRC_APP" ]]; then
              echo "Build product not found at: ${SRC_APP:-<unresolved>}" >&2
              exit 1
          fi

          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' \
                      "$SRC_APP/Contents/Info.plist")"
          echo "Version:          $VERSION"

          # Stage a fresh copy so signing never mutates the DerivedData product.
          rm -rf "$DIST"; mkdir -p "$DIST"
          APP="$DIST/MacColi.app"
          cp -R "$SRC_APP" "$APP"

          # Codesign nested Mach-O first (deepest-first), then the outer app, so
          # the seal stays valid even if the bundle ever gains frameworks.
          SIGN_FLAGS=(--force --options runtime --timestamp --sign "$IDENTITY")
          while IFS= read -r -d '' nested; do
              echo "Signing nested: ${nested#"$APP"/}"
              codesign "${SIGN_FLAGS[@]}" "$nested"
          done < <(find "$APP/Contents" \
                      \( -name "*.framework" -o -name "*.dylib" -o -name "*.appex" \) \
                      -print0 2>/dev/null | sort -rz)

          echo "Signing app bundle…"
          codesign "${SIGN_FLAGS[@]}" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

          # Notarize the app, then staple the ticket onto it.
          ZIP="$DIST/MacColi-$VERSION.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "Submitting to notary service (profile: $NOTARY_PROFILE)…"
          xcrun notarytool submit "$ZIP" --keychain-profile "$NOTARY_PROFILE" --wait
          xcrun stapler staple "$APP"

          # Re-zip the *stapled* app as the distributable (the earlier zip
          # predates the ticket; stapling applies to the .app, not the zip).
          rm -f "$ZIP"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "→ $ZIP"

          # Notarized + stapled DMG.
          DMG="$DIST/MacColi-$VERSION.dmg"
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/MacColi.app"
          ln -s /Applications "$STAGE/Applications"
          echo "Building DMG…"
          hdiutil create -volname "MacColi" -srcfolder "$STAGE" -ov -format UDZO "$DMG" >/dev/null
          rm -rf "$STAGE"
          xcrun notarytool submit "$DMG" --keychain-profile "$NOTARY_PROFILE" --wait
          xcrun stapler staple "$DMG"
          echo "→ $DMG"

          # Final verification — what Gatekeeper sees on a clean Mac.
          spctl -a -vvv -t exec "$APP" || true
          xcrun stapler validate "$APP" || true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: MacColi-dist
          path: |
            dist/*.zip
            dist/*.dmg
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" dist/*.zip dist/*.dmg \
            --title "MacColi $GITHUB_REF_NAME" --generate-notes

      # Update the Homebrew cask in Jun-Jin/homebrew-maccoli to point at this
      # release. We hash the DMG we just built (authoritative — it's the exact
      # asset uploaded above) and rewrite the cask's version + sha256, then
      # commit straight to the tap's main. A release published by the default
      # GITHUB_TOKEN can't trigger another workflow, so this runs in-line here
      # rather than as a separate `on: release` workflow. HOMEBREW_TAP_TOKEN is
      # a PAT with Contents:write on the tap repo.
      - name: Bump Homebrew cask
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          DMG="dist/MacColi-$VERSION.dmg"
          if [[ ! -f "$DMG" ]]; then
              echo "Expected $DMG (from tag $GITHUB_REF_NAME) but it is missing" >&2
              exit 1
          fi
          SHA="$(shasum -a 256 "$DMG" | awk '{print $1}')"
          echo "Bumping cask → version $VERSION, sha256 $SHA"

          WORK="$(mktemp -d)"
          git clone --depth 1 \
              "https://x-access-token:${TAP_TOKEN}@github.com/Jun-Jin/homebrew-maccoli.git" "$WORK"
          CASK="$WORK/Casks/maccoli.rb"
          sed -i '' -E "s/^  version \".*\"/  version \"$VERSION\"/" "$CASK"
          sed -i '' -E "s/^  sha256 \".*\"/  sha256 \"$SHA\"/"      "$CASK"

          git -C "$WORK" config user.name  "github-actions[bot]"
          git -C "$WORK" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git -C "$WORK" diff --quiet; then
              echo "Cask already at $VERSION — nothing to do."
              exit 0
          fi
          git -C "$WORK" commit -aqm "maccoli $VERSION"
          git -C "$WORK" push origin HEAD:main
          echo "✅ Cask bumped to $VERSION."
